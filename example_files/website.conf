
proxy_cache_path /var/cache/nginx/life-organizer levels=1:2 keys_zone=life-organizer:10m max_size=500m inactive=60m use_temp_path=off;

# production client
server {
        server_name schedulr.ai www.schedulr.ai;

	listen 443 ssl; # managed by Certbot
	ssl_certificate /etc/letsencrypt/live/schedulr.ai/fullchain.pem; # managed by Certbot
	ssl_certificate_key /etc/letsencrypt/live/schedulr.ai/privkey.pem; # managed by Certbot
	include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
	ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


	location / {
		proxy_set_header X-Forwarded-Host $host:$server_port;
		proxy_set_header X-Forwarded-Server $host;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

		proxy_pass      http://127.0.0.1:%%PROD_FRONTEND_PORT%%;
	}

	location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
		proxy_cache life-organizer;
		proxy_cache_valid 200 30d;
		proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
		proxy_pass http://127.0.0.1:%%PROD_FRONTEND_PORT%%; # Point this to your Docker container
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		expires 30d;
		access_log off;
	}
}
