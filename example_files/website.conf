server {
    if ($host = staging.api.%%APP_DOMAIN%%) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = staging.%%APP_DOMAIN%%) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = api.%%APP_DOMAIN%%) {
